name: Deploy

# Manual, opt-in production deploy over SSH — the CD half of the pipeline.
#
# It deliberately does NOT run on push: a single-VPS production box shouldn't
# auto-deploy every commit. Trigger it from the Actions tab ("Run workflow")
# when you're ready to ship.
#
# Inert until you add three repository secrets
# (Settings -> Secrets and variables -> Actions):
#   DEPLOY_SSH_HOST - server hostname or IP
#   DEPLOY_SSH_USER - the app user that owns /opt/inbox-ai and runs pm2
#   DEPLOY_SSH_KEY  - a private key whose public half is in that user's
#                     ~/.ssh/authorized_keys
#
# The remote steps mirror setup-vps.sh: pull, install, migrate, build, then a
# zero-downtime `pm2 reload` of the cluster.

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Require deploy secrets
        run: |
          test -n "${{ secrets.DEPLOY_SSH_HOST }}" || { echo "::error::DEPLOY_SSH_HOST secret is not set"; exit 1; }
          test -n "${{ secrets.DEPLOY_SSH_USER }}" || { echo "::error::DEPLOY_SSH_USER secret is not set"; exit 1; }
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"  || { echo "::error::DEPLOY_SSH_KEY secret is not set"; exit 1; }

      - name: Deploy over SSH
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" 'set -e
            cd /opt/inbox-ai
            git pull --ff-only
            npm ci --omit=optional
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            pm2 reload ecosystem.config.js --update-env'
