<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Viltreon — Hero B: Fly-through</title>
<!--
  Concept B: "Fly-through". On scroll you travel forward through a 3D field of
  floating emails + white lights; they rush past, dissolve into a bloom of
  light, and the headline emerges from it.
  Techniques: pinned scrub timeline · 3D depth field + perspective travel ·
  light bloom birth · depth particles · masked reveal · reduced-motion fallback.
-->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500&f[]=general-sans@400,500&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#ea4335; --blue:#4285f4; --green:#34a853; --yellow:#fbbc05;
    --ink:#f3f5f8; --muted:#9aa3b2;
    --display:"Satoshi",-apple-system,"Segoe UI",sans-serif;
    --sans:"General Sans",-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#05060a;color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .hero{height:100vh;width:100%;position:relative;overflow:hidden;perspective:900px;perspective-origin:50% 50%}
  .bg{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 50%, #121a2e 0%, #090b12 48%, #05060a 78%)}
  .vignette{position:absolute;inset:0;box-shadow:inset 0 0 220px 70px rgba(0,0,0,.85);pointer-events:none}

  .lights{position:absolute;inset:0;pointer-events:none}
  .lights span{position:absolute;border-radius:50%;background:radial-gradient(circle,#fff,rgba(255,255,255,0) 70%);
      animation:tw 6s ease-in-out infinite;will-change:opacity}
  @keyframes tw{0%,100%{opacity:.12}50%{opacity:.8}}

  /* 3D field of email cards travelling toward the viewer */
  .field{position:absolute;inset:0;transform-style:preserve-3d;will-change:transform}
  .card{position:absolute;width:180px;height:118px;border-radius:14px;left:50%;top:50%;margin:-59px 0 0 -90px;
      background:linear-gradient(180deg,#fafbfd,#eceff5);box-shadow:0 24px 50px -24px rgba(0,0,0,.7);
      overflow:hidden;will-change:transform,opacity,filter;backface-visibility:hidden}
  .card .tab{height:6px} .card .ch{display:flex;align-items:center;gap:8px;padding:12px 13px 0}
  .card .cd{width:18px;height:18px;border-radius:6px;background:#dfe3ea}
  .card .cl{flex:1;height:7px;border-radius:4px;background:#e3e7ee}
  .card .cb{padding:12px 13px}
  .card .cb i{display:block;height:6px;border-radius:3px;background:#e8ebf1;margin-top:7px} .card .cb i:nth-child(2){width:70%}

  .bloom{position:absolute;left:50%;top:50%;width:60vmin;height:60vmin;transform:translate(-50%,-50%) scale(.2);
      border-radius:50%;background:radial-gradient(circle,#ffffff 0%, rgba(200,220,255,.5) 30%, rgba(120,160,255,0) 64%);
      opacity:0;pointer-events:none;mix-blend-mode:screen;will-change:transform,opacity}

  .reveal{position:absolute;inset:0;display:grid;place-content:center;text-align:center;padding:0 24px;opacity:0;will-change:transform,opacity}
  .eyebrow{font-weight:600;font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:#8fb6ff}
  h1{font-family:var(--display);font-weight:900;font-size:clamp(40px,8vw,92px);line-height:.98;letter-spacing:-.04em;margin:18px 0 0;
      background:linear-gradient(180deg,#fff,#cdd6e6);-webkit-background-clip:text;background-clip:text;color:transparent}
  .reveal p{color:var(--muted);font-size:clamp(15px,2vw,19px);margin:20px auto 0;max-width:46ch}
  .cta{display:flex;gap:14px;justify-content:center;margin-top:34px}
  .btn{font-weight:600;font-size:15px;border:none;cursor:pointer;border-radius:12px;padding:13px 24px;transition:.2s;font-family:var(--sans)}
  .btn--p{background:#fff;color:#0a0c12}.btn--p:hover{transform:translateY(-2px)}
  .btn--g{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.25)}.btn--g:hover{border-color:#fff}
  .hint{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);color:#6b7486;font-size:12px;letter-spacing:.2em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:8px;animation:bob 1.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,6px)}}

  .after{min-height:100vh;background:linear-gradient(180deg,#05060a,#080a11);display:grid;place-content:center;text-align:center;padding:120px 24px;gap:28px}
  .after h2{font-family:var(--display);font-weight:700;font-size:clamp(28px,5vw,48px);letter-spacing:-.03em}
  .labels{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .lab{display:flex;align-items:center;gap:9px;background:#0e1320;border:1px solid #1b2336;border-radius:999px;padding:9px 16px;color:#cdd5e3;font-size:14px}
  .lab .d{width:10px;height:10px;border-radius:3px}

  @media (prefers-reduced-motion: reduce){
    .field{display:none}.lights span{animation:none;opacity:.4}
    .reveal{opacity:1 !important;transform:none !important}.hint{display:none}
  }
</style>
</head>
<body>
<section class="hero" id="hero">
  <div class="bg" aria-hidden="true"></div>
  <div class="lights" id="lights" aria-hidden="true"></div>
  <div class="field" id="field" aria-hidden="true"></div>
  <div class="bloom" id="bloom" aria-hidden="true"></div>

  <div class="reveal" id="reveal">
    <span class="eyebrow">Viltreon</span>
    <h1>Refresh<br>your inbox.</h1>
    <p>Every new email, read and filed the moment it lands. Open it once - it never piles up again.</p>
    <div class="cta"><a class="btn btn--p">Start free</a><a class="btn btn--g">See how it works</a></div>
  </div>
  <div class="hint" aria-hidden="true">Scroll<span style="font-size:16px">&#8595;</span></div>
</section>

<section class="after">
  <h2>Then it sorts itself - into your colors.</h2>
  <div class="labels">
    <span class="lab"><span class="d" style="background:var(--red)"></span> Important</span>
    <span class="lab"><span class="d" style="background:var(--blue)"></span> Finance</span>
    <span class="lab"><span class="d" style="background:var(--green)"></span> Receipts</span>
    <span class="lab"><span class="d" style="background:var(--yellow)"></span> Newsletters</span>
  </div>
</section>

<script>
  const COLORS = ['#ea4335','#4285f4','#34a853','#fbbc05','#ea4335','#4285f4'];
  // build the white lights
  (function(){
    const w=document.getElementById('lights');
    for(let i=0;i<40;i++){const s=document.createElement('span');const z=Math.random()*3+1;
      s.style.width=s.style.height=z+'px';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
      s.style.animationDelay=(-Math.random()*6)+'s';w.appendChild(s);}
  })();
  // build the depth field of email cards
  const field=document.getElementById('field'); const cards=[];
  for(let i=0;i<16;i++){
    const c=document.createElement('div');c.className='card';
    const col=COLORS[i%COLORS.length];
    c.innerHTML='<div class="tab" style="background:'+col+'"></div><div class="ch"><div class="cd"></div><div class="cl"></div></div><div class="cb"><i></i><i></i></div>';
    const x=(Math.random()*2-1)*620, y=(Math.random()*2-1)*360, z=-2400*Math.random()-200;
    const rot=(Math.random()*2-1)*16;
    c.style.transform='translate3d('+x+'px,'+y+'px,'+z+'px) rotate('+rot+'deg)';
    c.dataset.x=x;c.dataset.y=y;c.dataset.z=z;c.dataset.rot=rot;
    field.appendChild(c);cards.push(c);
  }

  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(!reduce){
    gsap.registerPlugin(ScrollTrigger);
    // idle drift so the field feels alive before scroll
    cards.forEach((c,i)=>{ gsap.to(c,{y:'+='+((Math.random()*2-1)*30),duration:4+Math.random()*3,yoyo:true,repeat:-1,ease:'sine.inOut',delay:Math.random()*2}); });

    const tl=gsap.timeline({scrollTrigger:{trigger:'#hero',start:'top top',end:'+=2600',scrub:1,pin:true,anticipatePin:1}});
    // fly the whole field toward the viewer
    tl.to('#field',{z:1500,ease:'power1.in'},0)
      .to('#field',{rotateZ:6,ease:'none'},0)
      // cards dissolve into light
      .to('.card',{autoAlpha:0,filter:'blur(7px)',ease:'power2.in'},0.5)
      // bloom of light grows then fades
      .fromTo('#bloom',{scale:.2,opacity:0},{scale:1.5,opacity:1,ease:'power2.out'},0.48)
      .to('#bloom',{opacity:0,ease:'power2.in'},0.74)
      // headline emerges from the light
      .fromTo('#reveal',{autoAlpha:0,scale:.72,filter:'blur(8px)'},{autoAlpha:1,scale:1,filter:'blur(0px)',ease:'power3.out'},0.6)
      .to('.hint',{autoAlpha:0},0.05);
  }
</script>
</body>
</html>
