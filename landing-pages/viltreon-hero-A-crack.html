<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Viltreon — Hero A: The Crack</title>
<!--
  Concept A: "The Crack". A 3D email splits down the middle on scroll-scrub,
  light blooms through the gap, the halves rotate away in 3D, and the headline
  "Refresh your inbox" is revealed from behind.
  Techniques: pinned scrub timeline · 3D perspective split · light-beam birth ·
  depth particles (white floating lights) · masked reveal · reduced-motion fallback.
-->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500&f[]=general-sans@400,500&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#ea4335; --blue:#4285f4; --green:#34a853; --yellow:#fbbc05;
    --ink:#f3f5f8; --muted:#9aa3b2;
    --display:"Satoshi",-apple-system,"Segoe UI",sans-serif;
    --sans:"General Sans",-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#05060a;color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .hero{height:100vh;width:100%;position:relative;overflow:hidden;perspective:1400px;perspective-origin:50% 45%}

  /* depth 0-1: atmosphere */
  .bg{position:absolute;inset:0;background:
      radial-gradient(120% 80% at 50% 38%, #131a2e 0%, #090b12 45%, #05060a 75%);}
  .vignette{position:absolute;inset:0;box-shadow:inset 0 0 220px 60px rgba(0,0,0,.85);pointer-events:none}
  .lights{position:absolute;inset:0;pointer-events:none}
  .lights span{position:absolute;border-radius:50%;background:radial-gradient(circle,#fff 0%,rgba(255,255,255,.65) 35%,rgba(255,255,255,0) 70%);
      filter:blur(.4px);opacity:.0;animation:twinkle 7s ease-in-out infinite, drift 22s ease-in-out infinite;will-change:transform,opacity}
  @keyframes twinkle{0%,100%{opacity:.12}50%{opacity:.85}}
  @keyframes drift{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(14px,-22px,0)}}

  /* depth 4: the email (split into two clipped halves) */
  .emailwrap{position:absolute;inset:0;display:grid;place-items:center;transform-style:preserve-3d}
  .email{position:relative;width:min(460px,82vw);aspect-ratio:1.5/1;transform-style:preserve-3d;will-change:transform}
  .half{position:absolute;inset:0;border-radius:18px;background:linear-gradient(180deg,#fbfbfd,#eef1f6);
      box-shadow:0 40px 90px -30px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.9);
      backface-visibility:hidden;overflow:hidden;will-change:transform,opacity}
  .half--l{clip-path:inset(0 50% 0 0);transform-origin:left center}
  .half--r{clip-path:inset(0 0 0 50%);transform-origin:right center}
  .ehead{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid #e7eaf0}
  .ebadge{width:30px;height:30px;border-radius:9px;background:var(--red);display:grid;place-items:center;color:#fff;font-size:15px}
  .etitle{font-family:var(--display);font-weight:700;color:#1b1e24;font-size:15px;letter-spacing:-.01em}
  .edot{margin-left:auto;width:8px;height:8px;border-radius:50%;background:#cfd5df}
  .ebody{padding:20px}
  .ebody i{display:block;height:9px;border-radius:5px;background:#e6e9f0;margin-bottom:11px}
  .ebody i:nth-child(2){width:88%} .ebody i:nth-child(3){width:72%} .ebody i:nth-child(4){width:80%;background:#eef0f5}

  /* the light that lives in the crack */
  .seam{position:absolute;top:0;bottom:0;left:50%;width:2px;transform:translateX(-50%);
      background:linear-gradient(180deg,transparent,#fff,transparent);opacity:0;filter:blur(.3px)}
  .beam{position:absolute;top:-10%;bottom:-10%;left:50%;width:6px;transform:translateX(-50%) scaleX(0);transform-origin:center;
      background:linear-gradient(180deg,transparent 0%, rgba(255,255,255,.0) 8%, #ffffff 50%, rgba(255,255,255,0) 92%, transparent 100%);
      box-shadow:0 0 60px 24px rgba(255,255,255,.55), 0 0 140px 60px rgba(120,160,255,.25);opacity:0;will-change:transform,opacity}

  /* depth 4: the reveal */
  .reveal{position:absolute;inset:0;display:grid;place-content:center;text-align:center;padding:0 24px;opacity:0;will-change:transform,opacity}
  .eyebrow{font-family:var(--sans);font-weight:600;font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:#8fb6ff}
  h1{font-family:var(--display);font-weight:900;font-size:clamp(40px,8vw,92px);line-height:.98;letter-spacing:-.04em;margin:18px 0 0;
      background:linear-gradient(180deg,#ffffff,#cdd6e6);-webkit-background-clip:text;background-clip:text;color:transparent}
  .reveal p{color:var(--muted);font-size:clamp(15px,2vw,19px);margin:20px auto 0;max-width:46ch}
  .cta{display:flex;gap:14px;justify-content:center;margin-top:34px}
  .btn{font-family:var(--sans);font-weight:600;font-size:15px;border:none;cursor:pointer;border-radius:12px;padding:13px 24px;transition:.2s}
  .btn--p{background:#fff;color:#0a0c12}
  .btn--p:hover{transform:translateY(-2px)}
  .btn--g{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.25)}
  .btn--g:hover{border-color:#fff}

  /* scroll hint */
  .hint{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);color:#6b7486;font-size:12px;letter-spacing:.2em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:8px;animation:bob 1.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,6px)}}

  /* the "after" section so the page continues + the pin releases */
  .after{min-height:100vh;background:linear-gradient(180deg,#05060a,#080a11);display:grid;place-content:center;text-align:center;padding:120px 24px;gap:28px}
  .after h2{font-family:var(--display);font-weight:700;font-size:clamp(28px,5vw,48px);letter-spacing:-.03em}
  .labels{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .lab{display:flex;align-items:center;gap:9px;background:#0e1320;border:1px solid #1b2336;border-radius:999px;padding:9px 16px;color:#cdd5e3;font-size:14px}
  .lab .d{width:10px;height:10px;border-radius:3px}

  @media (prefers-reduced-motion: reduce){
    .lights span{animation:none;opacity:.4}
    .email{display:none} .reveal{opacity:1 !important;transform:none !important}
    .hint{display:none}
  }
</style>
</head>
<body>
<section class="hero" id="hero">
  <div class="bg" aria-hidden="true"></div>
  <div class="lights" id="lights" aria-hidden="true"></div>

  <div class="emailwrap">
    <div class="email" id="email">
      <div class="beam" aria-hidden="true"></div>
      <div class="half half--l" aria-hidden="true">
        <div class="ehead"><span class="ebadge">&#9993;</span><span class="etitle">Your inbox</span><span class="edot"></span></div>
        <div class="ebody"><i></i><i></i><i></i><i></i></div>
      </div>
      <div class="half half--r" aria-hidden="true">
        <div class="ehead"><span class="ebadge">&#9993;</span><span class="etitle">Your inbox</span><span class="edot"></span></div>
        <div class="ebody"><i></i><i></i><i></i><i></i></div>
      </div>
      <div class="seam" aria-hidden="true"></div>
    </div>
  </div>

  <div class="reveal" id="reveal">
    <span class="eyebrow">Viltreon</span>
    <h1>Refresh<br>your inbox.</h1>
    <p>Every new email, read and filed the moment it lands. Open it once - it never piles up again.</p>
    <div class="cta"><a class="btn btn--p">Start free</a><a class="btn btn--g">See how it works</a></div>
  </div>

  <div class="hint" aria-hidden="true">Scroll<span style="font-size:16px">&#8595;</span></div>
</section>

<section class="after">
  <h2>Then it sorts itself - into your colors.</h2>
  <div class="labels">
    <span class="lab"><span class="d" style="background:var(--red)"></span> Important</span>
    <span class="lab"><span class="d" style="background:var(--blue)"></span> Finance</span>
    <span class="lab"><span class="d" style="background:var(--green)"></span> Receipts</span>
    <span class="lab"><span class="d" style="background:var(--yellow)"></span> Newsletters</span>
  </div>
</section>

<script>
  // --- depth particles: white floating lights at varied size/depth ---
  (function(){
    const wrap = document.getElementById('lights');
    const N = 46;
    for(let i=0;i<N;i++){
      const s = document.createElement('span');
      const size = Math.random()*3.2 + 0.8;          // 0.8 - 4px
      s.style.width = s.style.height = size+'px';
      s.style.left = Math.random()*100+'%';
      s.style.top = Math.random()*100+'%';
      s.style.opacity = (0.1 + Math.random()*0.5).toFixed(2);
      s.style.animationDelay = (-Math.random()*7)+'s, '+(-Math.random()*22)+'s';
      s.dataset.depth = (0.2 + Math.random()*1.1).toFixed(2); // parallax factor
      wrap.appendChild(s);
    }
  })();

  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(!reduce){
    gsap.registerPlugin(ScrollTrigger);

    const tl = gsap.timeline({
      scrollTrigger:{ trigger:'#hero', start:'top top', end:'+=2600', scrub:1, pin:true, anticipatePin:1 }
    });

    // 1) email breathes in, seam ignites
    tl.fromTo('#email', {scale:.9, rotateX:8, y:10}, {scale:1, rotateX:0, y:0, ease:'power2.out'}, 0)
      .to('.seam', {opacity:1, ease:'power2.in'}, 0.05)
      // 2) THE CRACK — halves separate + rotate in 3D, light bursts through
      .to('.half--l', {xPercent:-26, rotateY:-34, z:60, ease:'power2.inOut'}, 0.18)
      .to('.half--r', {xPercent:26,  rotateY:34,  z:60, ease:'power2.inOut'}, 0.18)
      .to('.beam', {scaleX:1, opacity:1, ease:'power2.out'}, 0.2)
      .to('#email', {rotateX:-6, ease:'none'}, 0.18)
      // 3) halves fly out + fade, beam blooms then fades, headline revealed
      .to('.half--l', {xPercent:-80, rotateY:-72, autoAlpha:0, ease:'power2.in'}, 0.5)
      .to('.half--r', {xPercent:80,  rotateY:72,  autoAlpha:0, ease:'power2.in'}, 0.5)
      .to('.beam', {scaleX:2.4, opacity:0, ease:'power2.in'}, 0.5)
      .to('.seam', {opacity:0}, 0.5)
      .fromTo('#reveal', {autoAlpha:0, scale:.86, y:24}, {autoAlpha:1, scale:1, y:0, ease:'power3.out'}, 0.52)
      .to('.hint', {autoAlpha:0}, 0.05);

    // parallax on the lights as you scroll the pinned section
    gsap.to('.lights span', {
      yPercent: (i,el)=> -40 * parseFloat(el.dataset.depth),
      ease:'none',
      scrollTrigger:{ trigger:'#hero', start:'top top', end:'+=2600', scrub:1 }
    });
  }
</script>
</body>
</html>
